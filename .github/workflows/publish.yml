name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*" # Triggers on version tags like v0.1.0, v1.2.3

  workflow_dispatch: # Allow manual trigger from GitHub UI
    inputs:
      confirm:
        description: "Type 'publish' to confirm manual release"
        required: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Build the distribution package with uv
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Verify build artifacts
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-packages
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # 2. Publish to PyPI using Trusted Publishing (OIDC)
  #    No API token required — configure Trusted Publisher on PyPI:
  #    https://pypi.org/manage/account/publishing/
  # ──────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mega-mind-orchestrator

    permissions:
      id-token: write # Required for OIDC Trusted Publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC Trusted Publishing — no PYPI_API_TOKEN secret needed.
        # To use an API token instead, uncomment the lines below:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # 3. Create a GitHub Release with changelog
  # ──────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist-packages
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract section from CHANGELOG.md for this version
          awk -v ver="$VERSION" '
            BEGIN { found=0; output="" }
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { output = output $0 "\n" }
            END { printf "%s", output }
          ' CHANGELOG.md > /tmp/release_notes.md
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
